<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./form.css" />
    <title>Form</title>
</head>
<body>
    <form action="">
        <div>
            <label form="">Username</label> <br>
            <input type="text" name="Username">
        </div>
        <div>
            <label form="email-input">Email</label> <br>
            <input type="email" name="email-input" id="email-input" placeholder="example@domain.com" required />
        </div>
        <div>
            <label form="">Password</label> <br>
            <input type="password" name="password"> 
        </div>
        <div class="row">
            <div class="col-25">
                <label for="gender">Gender</label>
            </div>
            <div class="col-75">
                <select id="gender" name="gender">
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>
        </div>
            <div> <label form="">Alamat</label> <br>
                <textarea name="" id="" cols="30" rows="10">
                </textarea>
            </div>

        <div>
            <div>
                <label form="">Photo</label> <br>
                <input type="file" name="Photo">
        </div>
        <div class="row">
            <input type="submit" value="Submit">
          </div>
    </form>
</body>
</html>
